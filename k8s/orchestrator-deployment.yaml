apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: print-as-a-service
  labels:
    app: orchestrator
    component: greeting-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: orchestrator
          image: localhost:5000/pas-orchestrator:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KAFKA_BROKER
              value: kafka:9092
            - name: REDIS_HOST
              value: redis
            - name: HELLO_SERVICE_URL
              value: http://hello-service:4001
            - name: WORLD_SERVICE_URL
              value: http://world-service:4003
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: print-as-a-service
spec:
  selector:
    app: orchestrator
  ports:
    - port: 80
      targetPort: 8080
  type: NodePort
