apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-service
  namespace: print-as-a-service
  labels:
    app: hello-service
    token: hello
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-service
  template:
    metadata:
      labels:
        app: hello-service
        token: hello
    spec:
      containers:
        - name: hello
          image: localhost:5000/pas-hello:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4001
          env:
            - name: DB_HOST
              value: hello-db
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: hello-service
  namespace: print-as-a-service
spec:
  selector:
    app: hello-service
  ports:
    - port: 4001
      targetPort: 4001

