apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: space-service-hpa
  namespace: print-as-a-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: space-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Pods
      pods:
        metric:
          name: space_token_requests_total
        target:
          type: AverageValue
          averageValue: "100"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
